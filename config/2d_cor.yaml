# 2D Coronal Configuration - Medical Segmentation 
# Karpathy-style: explicit, readable parameters

# Model Settings
input_shape: [256, 256]  # 2D coronal slices
in_channels: 1
out_channels: 4  # Background + 3 tumor regions
num_stages: 4
base_chs: 32
deep_supervision: true

# Training Settings
nb_epochs: 100
lr: 3e-4
batch_size: 8  # Higher batch for 2D
device: "cuda"

# Optimizer
optimizer: "ADAMw"
weight_decay: 1e-2
scheduler: "PolyLR"
gamma: 0.9